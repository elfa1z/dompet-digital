<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="theme-color" content="#f8fafc"> <title>Dompet Digital Pro V6.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --success: #10b981; --danger: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1e293b; }
        .container { max-width: 480px; margin: 0 auto; padding-bottom: 30px; }
        
        /* HEADER */
        .header-section {
            background: white; padding: 20px; text-align: center;
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .header-title { font-weight: 800; font-size: 24px; color: #0f172a; margin-bottom: 15px; }
        .month-pill {
            display: inline-flex; align-items: center; background: white;
            border: 1.5px solid #e2e8f0; border-radius: 15px; padding: 5px 15px;
            font-weight: 600; color: var(--primary); gap: 10px;
        }
        .month-pill input { border: none; font-family: inherit; font-weight: 700; color: var(--primary); outline: none; cursor: pointer; }

        /* CARDS */
        .cards-wrapper { padding: 0 15px; }
        .main-card { 
            background: linear-gradient(135deg, #2563eb, #3b82f6); color: white; 
            border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 15px; 
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }
        .secondary-card { background: white; border-radius: 15px; padding: 15px; text-align: center; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 18px; text-align: center; border: 1px solid #e2e8f0; }

        /* SEARCH & FILTER */
        .search-filter-area { padding: 0 15px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .search-bar { width: 100%; padding: 12px 15px; border-radius: 12px; border: 2px solid #e2e8f0; outline: none; font-family: inherit; font-size: 14px; background: white; }
        
        .filter-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 100%; }
        .cat-filter { width: 100%; padding: 10px 5px; border-radius: 10px; border: 2.3px solid #e2e8f0; font-weight: 600; color: #64748b; background: white; outline: none; font-size: 11px; text-align: center; }

        /* FORM */
        .form-card { background: white; border-radius: 25px; padding: 20px; margin: 0 15px 20px; border: 1px solid #e2e8f0; }
        .input-field { width: 100%; height: 50px; padding: 0 15px; margin-bottom: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-family: inherit; font-size: 14px; outline: none; }
        .row { display: flex; gap: 10px; }
        .row select { flex: 1; min-width: 0; padding: 0 10px; }
        .account-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .account-grid input { display: none; }
        .acc-btn { border: 2px solid #f1f5f9; padding: 12px; border-radius: 12px; text-align: center; font-size: 13px; font-weight: 600; color: #64748b; background: #f8fafc; cursor: pointer; }
        input:checked + .acc-btn { background: #dbeafe; color: #1d4ed8; border-color: #3b82f6; }
        .btn-add { width: 100%; background: var(--primary); color: white; padding: 16px; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; font-size: 15px; }

        /* LIST ITEMS */
        .list-container { padding: 0 15px; }
        .list-item { 
            background: white; padding: 16px; border-radius: 18px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #f1f5f9; box-shadow: 0 2px 5px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .item-info b { color: #0f172a; font-size: 15px; display: block; }
        .item-info small { color: #64748b; font-size: 12px; font-weight: 500; }
        .amount-val { font-weight: 800; font-size: 16px; display: block; margin-bottom: 5px; }
        .action-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .btn-icon { border: none; width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .text-green { color: var(--success) !important; }
        .text-red { color: var(--danger) !important; }
        
        /* ANIMASI PULSE */
        @keyframes pulse-card {
            0% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            50% { transform: scale(1.03); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.15); border-color: var(--primary); }
            100% { transform: scale(1); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        }
        .pulse-update { animation: pulse-card 0.7s ease-in-out; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="header-title">Dompet Digital</div>
        <div class="month-pill">
            <span style="font-size: 12px;">Bulan:</span>
            <input type="month" id="filter-bulan" onchange="render()">
        </div>
    </div>

    <div class="cards-wrapper">
        <div class="main-card">
            <small style="opacity: 0.9; font-weight: 500; letter-spacing: 1px; font-size: 11px;">SALDO KESELURUHAN</small>
            <h1 id="v-semua" style="margin: 10px 0 0;">Rp 0</h1>
        </div>
        <div class="secondary-card">
            <small style="color: #64748b; font-weight: 600; font-size: 11px;">SALDO DITAMPILKAN</small>
            <h2 id="v-bulan" style="margin: 5px 0 0; color: #1e293b;">Rp 0</h2>
        </div>
        <div class="grid-stats">
            <div class="stat-box">
                <small style="font-size: 10px; font-weight: 700; color: #64748b;">TOTAL MASUK</small><br>
                <span class="text-green" id="v-masuk" style="font-weight: 800; font-size: 15px;">Rp 0</span>
            </div>
            <div class="stat-box">
                <small style="font-size: 10px; font-weight: 700; color: #64748b;">TOTAL KELUAR</small><br>
                <span class="text-red" id="v-keluar" style="font-weight: 800; font-size: 15px;">Rp 0</span>
            </div>
        </div>
    </div>

    <div class="search-filter-area">
        <input type="text" id="search-input" class="search-bar" placeholder="🔍 Cari keterangan transaksi..." oninput="render()">
        <div class="filter-row">
            <select id="filter-jns" class="cat-filter" onchange="syncFilterCategories(); render();">
                <option value="Semua">Semua Jenis</option>
                <option value="pemasukan">Masuk (+)</option>
                <option value="pengeluaran">Keluar (-)</option>
            </select>
            <select id="filter-kat" class="cat-filter" onchange="render()">
                <option value="Semua">Semua Kategori</option>
            </select>
            <select id="filter-akun" class="cat-filter" onchange="render()">
                <option value="Semua">Semua Akun</option>
                <option value="Cash">Cash</option>
                <option value="Kartu">Kartu</option>
                <option value="Bank">Bank</option>
                <option value="Invest">Invest</option>
            </select>
        </div>
    </div>

    <div class="form-card">
        <form id="f-dompet" onsubmit="saveData(event)">
            <input type="date" id="tgl" class="input-field" required>
            <input type="text" id="ket" class="input-field" placeholder="Keterangan transaksi..." required>
            <input type="number" id="jml" class="input-field" placeholder="Jumlah uang..." required>
            <div class="row">
                <select id="jns" class="input-field" onchange="updateKat()">
                    <option value="pengeluaran">Pengeluaran (-)</option>
                    <option value="pemasukan">Pemasukan (+)</option>
                </select>
                <select id="kat" class="input-field"></select>
            </div>
            <div class="account-grid">
                <input type="radio" name="akn" id="a1" value="Cash" checked><label for="a1" class="acc-btn">💵 Cash</label>
                <input type="radio" name="akn" id="a2" value="Kartu"><label for="a2" class="acc-btn">💳 Kartu</label>
                <input type="radio" name="akn" id="a3" value="Bank"><label for="a3" class="acc-btn">🏦 Bank</label>
                <input type="radio" name="akn" id="a4" value="Invest"><label for="a4" class="acc-btn">📈 Invest</label>
            </div>
            <button type="submit" id="btn-submit" class="btn-add">Tambah Transaksi</button>
        </form>
    </div>

    <div class="list-container" id="list-data"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('dompet_pro_v6')) || [];
    let editId = null;

    const iconEdit = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`;
    const iconDel = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`;

    const categories = {
        pemasukan: ['Gaji', 'THR', 'Bonus', 'Uang Saku', 'Kembalian', 'Pemberian', 'Piutang', 'Lainnya'],
        pengeluaran: ['Makanan', 'Transport', 'Belanja', 'Tagihan', 'Hiburan', 'Kesehatan', 'Lainnya']
    };

    function animateVal(id, end) {
        const obj = document.getElementById(id);
        let start = parseInt(obj.innerText.replace(/[^0-9-]/g, '')) || 0;
        const duration = 600;
        const startTime = performance.now();
        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const current = Math.floor(progress * (end - start) + start);
            obj.innerText = "Rp " + current.toLocaleString('id-ID');
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }

    function updateKat() {
        const j = document.getElementById('jns').value;
        const k = document.getElementById('kat');
        k.innerHTML = '';
        categories[j].forEach(o => k.innerHTML += `<option value="${o}">${o}</option>`);
    }

    function syncFilterCategories() {
        const jnsFilter = document.getElementById('filter-jns').value;
        const fKat = document.getElementById('filter-kat');
        const prevVal = fKat.value; 

        fKat.innerHTML = '<option value="Semua">Semua Kategori</option>';

        if (jnsFilter === 'Semua' || jnsFilter === 'pemasukan') {
            let pGroup = document.createElement('optgroup');
            pGroup.label = "--- PEMASUKAN ---";
            categories.pemasukan.forEach(o => {
                pGroup.innerHTML += `<option value="${o}">${o}</option>`;
            });
            fKat.appendChild(pGroup);
        }

        if (jnsFilter === 'Semua' || jnsFilter === 'pengeluaran') {
            let kGroup = document.createElement('optgroup');
            kGroup.label = "--- PENGELUARAN ---";
            categories.pengeluaran.forEach(o => {
                kGroup.innerHTML += `<option value="${o}">${o}</option>`;
            });
            fKat.appendChild(kGroup);
        }

        if (Array.from(fKat.options).some(opt => opt.value === prevVal)) {
            fKat.value = prevVal;
        } else {
            fKat.value = 'Semua';
        }
    }

    function saveData(e) {
        e.preventDefault();
        const data = {
            id: editId || Date.now(),
            tgl: document.getElementById('tgl').value,
            ket: document.getElementById('ket').value,
            jml: parseInt(document.getElementById('jml').value),
            jns: document.getElementById('jns').value,
            kat: document.getElementById('kat').value,
            akn: document.querySelector('input[name="akn"]:checked').value
        };

        const currentTargetId = data.id;

        if(editId) {
            db[db.findIndex(x => x.id === editId)] = data;
            editId = null;
            document.getElementById('btn-submit').innerText = "Tambah Transaksi";
        } else {
            db.push(data);
        }
        
        localStorage.setItem('dompet_pro_v6', JSON.stringify(db));
        document.getElementById('f-dompet').reset(); 
        initDate(); 
        render(currentTargetId); 
    }

    function hapus(id, el) {
        if(confirm('Hapus transaksi ini?')) {
            el.style.opacity = '0'; el.style.transform = 'translateX(20px)';
            setTimeout(() => { db = db.filter(x => x.id !== id); localStorage.setItem('dompet_pro_v6', JSON.stringify(db)); render(); }, 300);
        }
    }

    function edit(id) {
        const t = db.find(x => x.id === id); editId = id;
        document.getElementById('tgl').value = t.tgl;
        document.getElementById('ket').value = t.ket;
        document.getElementById('jml').value = t.jml;
        document.getElementById('jns').value = t.jns;
        updateKat(); document.getElementById('kat').value = t.kat;
        document.querySelector(`input[name="akn"][value="${t.akn}"]`).checked = true;
        document.getElementById('btn-submit').innerText = "Update Transaksi";
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function render(highlightId = null) {
        const bln = document.getElementById('filter-bulan').value;
        const jns = document.getElementById('filter-jns').value; 
        const kat = document.getElementById('filter-kat').value;
        const akn = document.getElementById('filter-akun').value;
        const sch = document.getElementById('search-input').value.toLowerCase();
        const container = document.getElementById('list-data');
        container.innerHTML = '';

        let tSemua = 0, tBulan = 0, mBulan = 0, kBulan = 0;
        db.forEach(t => { if(t.jns === 'pemasukan') tSemua += t.jml; else tSemua -= t.jml; });

        const filtered = db.filter(t => 
            t.tgl.startsWith(bln) && 
            (jns === 'Semua' || t.jns === jns) && 
            (kat === 'Semua' || t.kat === kat) && 
            (akn === 'Semua' || t.akn === akn) &&
            t.ket.toLowerCase().includes(sch)
        ).sort((a,b) => b.id - a.id);

        filtered.forEach(t => {
            const isM = t.jns === 'pemasukan';
            if(isM) { mBulan += t.jml; tBulan += t.jml; } else { kBulan += t.jml; tBulan -= t.jml; }

            const item = document.createElement('div');
            item.className = `list-item ${t.id === highlightId ? 'pulse-update' : ''}`;
            item.style.borderLeft = `6px solid ${isM ? 'var(--success)' : 'var(--danger)'}`;
            
            item.innerHTML = `
                <div class="item-info">
                    <b>${t.ket}</b>
                    <small>${t.tgl.split('-').reverse().join('/')} • ${t.kat} • ${t.akn}</small>
                </div>
                <div class="item-amount" style="text-align:right">
                    <span class="amount-val ${isM ? 'text-green' : 'text-red'}">
                        ${isM ? '+' : '-'} ${t.jml.toLocaleString('id-ID')}
                    </span>
                    <div class="action-btns">
                        <button class="btn-icon" style="background:#eff6ff" onclick="edit(${t.id})">${iconEdit}</button>
                        <button class="btn-icon" style="background:#fef2f2" onclick="hapus(${t.id}, this.parentElement.parentElement.parentElement)">${iconDel}</button>
                    </div>
                </div>`;
            container.appendChild(item);
        });

        animateVal('v-semua', tSemua); animateVal('v-bulan', tBulan);
        animateVal('v-masuk', mBulan); animateVal('v-keluar', kBulan);
    }

    function initDate() {
        const now = new Date(); const ymd = now.toISOString().split('T')[0];
        document.getElementById('tgl').value = ymd;
        if(!document.getElementById('filter-bulan').value) document.getElementById('filter-bulan').value = ymd.substring(0,7);
    }

    window.onload = () => { initDate(); updateKat(); syncFilterCategories(); render(); };
</script>
</body>
</html>
